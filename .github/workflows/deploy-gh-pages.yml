name: Deploy static site to gh-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build geometry
        run: npm run geo:build

      - name: Check data health
        run: npm run health:data

      - name: Validate data
        run: npm run validate:data

      - name: Check Svelte and TypeScript
        run: npm run check

      - name: Build static site
        run: npm run build

      - name: Publish build output to gh-pages
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          deploy_dir="$(mktemp -d)"
          cp -R build/. "$deploy_dir/"
          touch "$deploy_dir/.nojekyll"

          cd "$deploy_dir"
          git init
          git checkout -b gh-pages
          git add .
          git commit -m "Deploy static site"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.git"
          git push --force origin gh-pages
