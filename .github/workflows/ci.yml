name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build geometry
        run: npm run geo:build

      - name: Check data health
        run: npm run health:data

      - name: Validate data
        run: npm run validate:data

      - name: Check Svelte and TypeScript
        run: npm run check

      - name: Build static site
        run: npm run build
